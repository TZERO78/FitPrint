name: Deploy to GitHub Pages

# Build the add-in and publish the static files in dist/ to GitHub Pages.
# The production webpack build rewrites the manifest URLs from
# https://localhost:3000/ to the GitHub Pages location automatically.

on:
  push:
    branches: [main]
  workflow_dispatch:

# Permissions the deploy job needs to publish to Pages.
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one Pages deployment at a time.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      # Fail the deploy if a shipped (runtime) dependency has a high+ vulnerability.
      # --omit=dev is deliberate: the add-in is fully static, so only runtime deps
      # reach GitHub Pages. The build-time devDependencies (webpack, the office-addin
      # CLI tools, etc.) carry known advisories that never touch the artifact, so
      # auditing them here would block deploys for no security gain.
      - name: Audit shipped dependencies
        run: npm audit --omit=dev --audit-level=high

      - name: Build (production)
        run: npm run build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
